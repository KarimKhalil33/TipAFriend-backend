# Application
spring.application.name=TipAFriend API

# HTTPS Configuration (optional for local development)
# Uncomment these to enable HTTPS on port 8443
server.ssl.enabled=true
server.ssl.key-store=keystore/dev-keystore.p12
server.ssl.key-store-password=tipafriend-dev-password
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=localhost
server.port=8443

# Database - Using environment variables
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tipafriend_db}
spring.datasource.username=${DB_USER:tipafriend}
spring.datasource.password=${DB_PASSWORD:tipafriend}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security - JWT configuration
security.jwt.secret=${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long-for-security}
security.jwt.issuer=${JWT_ISSUER:tipafriend}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
